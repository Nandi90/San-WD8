services:
  sanwd:
    build: .
    ports:
      - "3088:3000"
    volumes:
      - ./data:/data
    environment:
      - NODE_ENV=development
      - DEV_AUTH=true
      - DATABASE_PATH=/data/sanwd.db
      - SESSION_SECRET=sanwd-v8-dev-secret-key-2026-abcdefgh
      - APP_URL=http://localhost:3088
    user: "root"
    restart: unless-stopped
